<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Archaeologist</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">

      <!-- ── Header ──────────────────────────────────────────── -->
      <header class="header">
        <div class="logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
            <path d="M11 8v3l2 2"/>
          </svg>
          <span>The Archaeologist</span>
        </div>
      </header>

      <!-- ── Spinner de carga inicial ────────────────────────── -->
      <section id="section-loading" class="section section-center">
        <svg class="spin" width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="#3b82f6" stroke-width="2.5">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
      </section>

      <!-- ── Sección: Login ───────────────────────────────────── -->
      <section id="section-auth" class="section" hidden>
        <p class="subtitle">
          Conecta tu cuenta para sincronizar tu historial de Steam.
        </p>

        <div class="form-group">
          <label for="input-email">Email</label>
          <input type="email" id="input-email"
                 placeholder="tu@email.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="input-password">Contraseña</label>
          <input type="password" id="input-password"
                 placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button id="btn-login" class="btn btn-primary">
          <span id="btn-login-text">Iniciar sesión</span>
          <svg id="btn-login-spinner" class="spin btn-spinner" width="14" height="14"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" hidden>
            <path d="M21 12a9 9 0 11-6.219-8.56"/>
          </svg>
        </button>

        <div id="auth-notification" class="notification" hidden></div>
      </section>

      <!-- ── Sección: Dashboard ───────────────────────────────── -->
      <section id="section-main" class="section" hidden>

        <div class="user-row">
          <div class="avatar">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/>
              <path d="M20 21a8 8 0 10-16 0"/>
            </svg>
          </div>
          <span id="user-email" class="user-email"></span>
          <button id="btn-logout" class="btn-logout" title="Cerrar sesión">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Salir
          </button>
        </div>

        <!-- Status box -->
        <div id="status-box" class="status-box">
          <div class="status-row">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <span>Listo para escanear</span>
          </div>
        </div>

        <!-- Instrucciones -->
        <div class="hint">
          <p>Navega a tu página de juegos en Steam y pulsa <strong>Escanear</strong>:</p>
          <code>steamcommunity.com/id/<em>TU_ID</em>/games</code>
        </div>

        <button id="btn-scan" class="btn btn-primary">
          <svg id="btn-scan-icon" width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/>
          </svg>
          <svg id="btn-scan-spinner" class="spin btn-spinner" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" hidden>
            <path d="M21 12a9 9 0 11-6.219-8.56"/>
          </svg>
          <span id="btn-scan-text">Escanear historial actual</span>
        </button>

        <div id="scan-notification" class="notification" hidden></div>
      </section>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
